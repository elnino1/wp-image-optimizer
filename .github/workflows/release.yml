name: Release

on:
  push:
    branches:
      - main

jobs:
  release:
    name: Semantic release & plugin zip
    runs-on: ubuntu-latest
    permissions:
      contents: write       # push tags + create GitHub release
      pull-requests: write  # update PR with release info (semantic-release)

    steps:
      - name: Checkout (full history for semantic-release)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false   # semantic-release uses its own token

      # ── Semantic release ──────────────────────────────────────────────────
      # Reads conventional commits since the last tag and:
      #   • bumps the version (patch / minor / major)
      #   • creates a Git tag (e.g. v1.2.3)
      #   • outputs the new version so the next step can name the zip
      - name: Run semantic-release
        id: semrel
        uses: cycjimmy/semantic-release-action@v4
        with:
          # Plugins are installed automatically; pin versions for stability
          extra_plugins: |
            @semantic-release/changelog
            @semantic-release/git
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── Build zip (only when a new version was actually released) ─────────
      - name: Build plugin zip
        if: steps.semrel.outputs.new_release_published == 'true'
        run: |
          PLUGIN_SLUG="wp-image-optimizer"
          VERSION="${{ steps.semrel.outputs.new_release_version }}"
          DIST_DIR="${PLUGIN_SLUG}"

          mkdir -p "${DIST_DIR}"
          cp wp-image-optimizer.php "${DIST_DIR}/"
          cp -r includes            "${DIST_DIR}/"
          cp -r assets              "${DIST_DIR}/"
          cp    README.md           "${DIST_DIR}/"

          zip -r "${PLUGIN_SLUG}-v${VERSION}.zip" "${DIST_DIR}/"
          echo "ZIP_NAME=${PLUGIN_SLUG}-v${VERSION}.zip" >> $GITHUB_ENV

      # ── Attach zip to the release that semantic-release just created ──────
      - name: Upload zip to GitHub Release
        if: steps.semrel.outputs.new_release_published == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ steps.semrel.outputs.new_release_version }}"
          files: ${{ env.ZIP_NAME }}
