name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: Build & Release plugin zip
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set version from tag
        id: version
        run: echo "tag=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT

      - name: Build plugin zip
        run: |
          PLUGIN_SLUG="wp-image-optimizer"
          DIST_DIR="${PLUGIN_SLUG}"

          # Create a clean staging directory
          mkdir -p "${DIST_DIR}"

          # Copy only the files WordPress needs
          cp wp-image-optimizer.php "${DIST_DIR}/"
          cp -r includes           "${DIST_DIR}/"
          cp -r assets             "${DIST_DIR}/"
          cp    README.md          "${DIST_DIR}/"

          # Zip it up
          zip -r "${PLUGIN_SLUG}-${{ steps.version.outputs.tag }}.zip" "${DIST_DIR}/"

      - name: Create GitHub Release and upload zip
        uses: softprops/action-gh-release@v2
        with:
          files: "wp-image-optimizer-${{ steps.version.outputs.tag }}.zip"
          generate_release_notes: true
