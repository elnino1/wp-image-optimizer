name: Tests

on:
  push:
    branches: [ "main", "master", "develop" ]
  pull_request:
    branches: [ "main", "master", "develop" ]

jobs:
  unit-tests:
    name: PHP ${{ matrix.php }} – Unit & Integration
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        php: [ "8.2", "8.3" ]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          # GD with WebP support (avif requires PHP 8.1+ & libavif; present on ubuntu-latest)
          extensions: gd, imagick, mbstring
          # Report coverage in the summary (optional – remove if you don't want it)
          coverage: none
          tools: composer:v2

      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache Composer packages
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: composer-php${{ matrix.php }}-${{ hashFiles('composer.lock') }}
          restore-keys: composer-php${{ matrix.php }}-

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress --no-interaction

      - name: Create test fixture image
        # Generates a small JPEG so tests that need a real image file have one.
        # The file is already committed; this step is a safety net for clean checkouts
        # where the binary might be absent.
        run: |
          if [ ! -f tests/_data/test-image.jpg ]; then
            php -r "
              \$img = imagecreatetruecolor(200, 200);
              \$bg  = imagecolorallocate(\$img, 100, 149, 237);
              imagefill(\$img, 0, 0, \$bg);
              imagejpeg(\$img, 'tests/_data/test-image.jpg', 90);
              imagedestroy(\$img);
            "
          fi

      - name: Run Unit & Integration tests
        run: php vendor/bin/codecept run Unit --no-ansi --no-interaction
