name: Auto-create PR

on:
  push:
    branches-ignore:
      - main
      - master

jobs:
  open-pr:
    name: Open pull request if none exists
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create PR if missing
        uses: actions/github-script@v7
        with:
          script: |
            const branch = context.ref.replace('refs/heads/', '');
            const base   = 'main';

            // Check whether a PR already exists for this branch
            const { data: prs } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              head:  `${context.repo.owner}:${branch}`,
              base,
              state: 'open',
            });

            if (prs.length > 0) {
              console.log(`PR already exists: #${prs[0].number}`);
              return;
            }

            // Build a human-readable title from the branch name
            const title = branch
              .replace(/^(feature|fix|chore|refactor|docs|test|ci)\//i, '')
              .replace(/[-_]/g, ' ')
              .replace(/\b\w/g, c => c.toUpperCase());

            const { data: pr } = await github.rest.pulls.create({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              head:  branch,
              base,
              title,
              body: '> Auto-generated PR — please fill in the description.',
              draft: false,
            });

            console.log(`Created PR #${pr.number}: ${pr.html_url}`);
